<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MENTOR — AI Career Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grain"></div>
  <div class="bg-mesh"></div>

  <div class="app-shell">
    <header class="topbar">
      <div class="logo-group">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <circle cx="11" cy="11" r="10" stroke="var(--accent)" stroke-width="1.5"/>
            <path d="M7 11 C7 8 9 7 11 7 C13 7 15 8.5 15 11 C15 13 13.5 14.5 11 15" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="11" cy="17" r="1" fill="var(--accent)"/>
          </svg>
        </div>
        <span class="logo-text">MENTOR</span>
        <span class="logo-sub">AI Career Guide</span>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>Active</span>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">
        <div class="welcome-block">
          <div class="welcome-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="19" stroke="var(--accent)" stroke-width="1.2" stroke-dasharray="4 2"/>
              <path d="M13 20 C13 15 16 13 20 13 C24 13 27 15.5 27 20 C27 23.5 24.5 26 20 27" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="20" cy="30" r="1.5" fill="var(--accent)"/>
            </svg>
          </div>
          <h1 class="welcome-title">Your career mentor awaits.</h1>
          <p class="welcome-sub">Not a quiz. Not a form. A real conversation that helps you figure out where you belong.</p>
          <button class="start-btn" id="startBtn">Begin the conversation →</button>
        </div>
      </div>
    </main>

    <footer class="input-dock" id="inputDock" style="display:none">
      <div class="input-wrap">
        <textarea
          id="userInput"
          class="input-field"
          placeholder="Type your message..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 9 L16 9 M10 3 L16 9 L10 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
